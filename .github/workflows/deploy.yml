name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run deploy in dry-run mode"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 25

    env:
      YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID || secrets.YC_FOLDER_ID }}
      YC_FUNCTION_NAME: ${{ vars.YC_FUNCTION_NAME || vars.YC_CLOUD_FUNCTION_NAME || secrets.YC_FUNCTION_NAME || secrets.YC_CLOUD_FUNCTION_NAME || 'notify-gateway' }}
      YC_API_GW_NAME: ${{ vars.YC_API_GW_NAME || secrets.YC_API_GW_NAME || 'notify-gateway-gw' }}
      YC_SERVICE_ACCOUNT_ID: ${{ vars.YC_SERVICE_ACCOUNT_ID || secrets.YC_SERVICE_ACCOUNT_ID }}
      YC_FUNCTION_ENTRYPOINT: ${{ vars.YC_FUNCTION_ENTRYPOINT || secrets.YC_FUNCTION_ENTRYPOINT || 'handler.handler' }}
      NOTIFY_PUBLIC_BASE_URL: ${{ vars.NOTIFY_PUBLIC_BASE_URL || secrets.NOTIFY_PUBLIC_BASE_URL }}
      FUNCTION_SOURCE_DIR: src
      FUNCTION_RUNTIME: python311

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve dry-run mode
        env:
          NOTIFY_API_KEYS: ${{ secrets.NOTIFY_API_KEYS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "DRY_RUN=${{ inputs.dry_run }}" >> "$GITHUB_ENV"
          else
            if [[ -z "${NOTIFY_API_KEYS:-}" || -z "${TELEGRAM_BOT_TOKEN:-}" || -z "${TELEGRAM_CHAT_ID:-}" ]]; then
              echo "DRY_RUN=true" >> "$GITHUB_ENV"
              echo "Deploy secrets are incomplete; forcing dry-run mode for this push."
            else
              echo "DRY_RUN=false" >> "$GITHUB_ENV"
            fi
          fi

      - name: Validate required config
        env:
          YC_SA_JSON_CREDENTIALS: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          NOTIFY_API_KEYS: ${{ secrets.NOTIFY_API_KEYS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          test -n "${YC_SA_JSON_CREDENTIALS:-}" || { echo "YC_SA_JSON_CREDENTIALS secret is required" >&2; exit 1; }
          test -n "${YC_FOLDER_ID:-}" || { echo "YC_FOLDER_ID is required (vars or secrets)" >&2; exit 1; }
          test -n "${YC_FUNCTION_NAME:-}" || { echo "YC_FUNCTION_NAME (or YC_CLOUD_FUNCTION_NAME) is required" >&2; exit 1; }
          test -n "${YC_SERVICE_ACCOUNT_ID:-}" || { echo "YC_SERVICE_ACCOUNT_ID is required (vars or secrets)" >&2; exit 1; }
          test -n "${YC_FUNCTION_ENTRYPOINT:-}" || { echo "YC_FUNCTION_ENTRYPOINT is required" >&2; exit 1; }
          if [[ "${DRY_RUN}" != "true" ]]; then
            test -n "${NOTIFY_API_KEYS:-}" || { echo "NOTIFY_API_KEYS secret is required for deploy" >&2; exit 1; }
            test -n "${TELEGRAM_BOT_TOKEN:-}" || { echo "TELEGRAM_BOT_TOKEN secret is required for deploy" >&2; exit 1; }
            test -n "${TELEGRAM_CHAT_ID:-}" || { echo "TELEGRAM_CHAT_ID (vars or secrets) is required for deploy" >&2; exit 1; }
          fi

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip


      - name: Deploy function version
        if: env.DRY_RUN != 'true'
        uses: yc-actions/yc-sls-function@v4
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          folder-id: ${{ env.YC_FOLDER_ID }}
          function-name: ${{ env.YC_FUNCTION_NAME }}
          runtime: ${{ env.FUNCTION_RUNTIME }}
          entrypoint: ${{ env.YC_FUNCTION_ENTRYPOINT }}
          service-account: ${{ env.YC_SERVICE_ACCOUNT_ID }}
          environment: |
            NOTIFY_API_KEYS=${{ secrets.NOTIFY_API_KEYS }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID=${{ vars.TELEGRAM_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
          include: |
            src/**
          exclude: |
            .git/**
            .github/**
            build/**
            docs/**

      - name: Resolve IAM token
        env:
          YC_SA_JSON_CREDENTIALS: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
        run: |
          set -euo pipefail

          KEY_FILE="$RUNNER_TEMP/yc-sa-key.json"
          KEY_FILE="$KEY_FILE" YC_SA_JSON_CREDENTIALS="${YC_SA_JSON_CREDENTIALS}" python - <<'PYKEY'
          import base64
          import json
          import os

          raw_value = os.environ.get("YC_SA_JSON_CREDENTIALS", "").strip()
          if not raw_value:
              raise SystemExit("YC_SA_JSON_CREDENTIALS is empty")

          key_obj = None
          try:
              key_obj = json.loads(raw_value)
          except json.JSONDecodeError:
              pass

          if key_obj is None:
              try:
                  decoded = base64.b64decode(raw_value, validate=True).decode("utf-8")
                  key_obj = json.loads(decoded)
              except Exception as exc:  # noqa: BLE001
                  raise SystemExit(
                      "YC_SA_JSON_CREDENTIALS must be raw JSON or base64-encoded JSON"
                  ) from exc

          with open(os.environ["KEY_FILE"], "w", encoding="utf-8") as fh:
              json.dump(key_obj, fh)
          PYKEY

          IAM_TOKEN=$(KEY_FILE="$KEY_FILE" python - <<'PYTOKEN'
          import json
          import os
          import urllib.request
          import urllib.error

          key_file = os.environ["KEY_FILE"]
          with open(key_file, "r", encoding="utf-8") as fh:
              key = json.load(fh)

          payload = json.dumps({"serviceAccountKey": key}).encode("utf-8")
          req = urllib.request.Request(
              "https://iam.api.cloud.yandex.net/iam/v1/tokens",
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=60) as resp:
                  print(json.load(resp).get("iamToken", ""))
          except urllib.error.HTTPError as err:
              body = err.read().decode("utf-8", errors="replace")
              raise SystemExit(f"IAM token exchange failed ({err.code}): {body}") from err
          PYTOKEN
          )

          test -n "${IAM_TOKEN}" || { echo "Failed to obtain YC_IAM_TOKEN" >&2; exit 1; }
          echo "::add-mask::${IAM_TOKEN}"
          echo "YC_IAM_TOKEN=${IAM_TOKEN}" >> "$GITHUB_ENV"

      - name: Bootstrap API Gateway + endpoint
        run: |
          set -euo pipefail

          ARGS=(
            --folder-id "${YC_FOLDER_ID}"
            --gateway-name "${YC_API_GW_NAME}"
            --function-name "${YC_FUNCTION_NAME}"
            --service-account-id "${YC_SERVICE_ACCOUNT_ID}"
            --spec-template "infra/apigw.yaml"
            --spec-rendered "build/apigw.rendered.yaml"
            --iam-token "${YC_IAM_TOKEN}"
            --output-env
          )

          if [[ -n "${NOTIFY_PUBLIC_BASE_URL:-}" ]]; then
            ARGS+=(--public-base-url "${NOTIFY_PUBLIC_BASE_URL}")
          fi

          if [[ "${DRY_RUN}" == "true" ]]; then
            ARGS+=(--dry-run)
          fi

          BOOTSTRAP_OUTPUT=$(python tools/yc_bootstrap.py "${ARGS[@]}")
          echo "${BOOTSTRAP_OUTPUT}"

          while IFS='=' read -r key value; do
            [[ -z "${key}" ]] && continue
            echo "${key}=${value}" >> "$GITHUB_ENV"
          done <<< "${BOOTSTRAP_OUTPUT}"

      - name: Smoke-check /notify
        env:
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
        run: |
          set -euo pipefail
          if [[ "${DRY_RUN}" != "true" && -z "${NOTIFY_API_KEY:-}" ]]; then
            echo "NOTIFY_API_KEY secret is required" >&2
            exit 1
          fi

          test -n "${NOTIFY_ENDPOINT:-}" || { echo "NOTIFY_ENDPOINT could not be resolved" >&2; exit 1; }

          if [[ "${DRY_RUN}" == "true" ]]; then
            infra/scripts/smoke_notify.sh --dry-run
          else
            infra/scripts/smoke_notify.sh
          fi
