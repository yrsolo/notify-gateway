name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run deploy in dry-run mode"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 25

    env:
      YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID || secrets.YC_FOLDER_ID }}
      YC_FUNCTION_NAME: ${{ vars.YC_FUNCTION_NAME || vars.YC_CLOUD_FUNCTION_NAME || secrets.YC_FUNCTION_NAME || secrets.YC_CLOUD_FUNCTION_NAME || 'notify-gateway' }}
      YC_API_GW_NAME: ${{ vars.YC_API_GW_NAME || secrets.YC_API_GW_NAME || 'notify-gateway-gw' }}
      YC_SERVICE_ACCOUNT_ID: ${{ vars.YC_SERVICE_ACCOUNT_ID || secrets.YC_SERVICE_ACCOUNT_ID }}
      YC_FUNCTION_ENTRYPOINT: ${{ vars.YC_FUNCTION_ENTRYPOINT || secrets.YC_FUNCTION_ENTRYPOINT || 'handler.handler' }}
      FUNCTION_SOURCE_DIR: src
      FUNCTION_RUNTIME: python311

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve dry-run mode
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "DRY_RUN=${{ inputs.dry_run }}" >> "$GITHUB_ENV"
          else
            echo "DRY_RUN=false" >> "$GITHUB_ENV"
          fi

      - name: Validate required config
        env:
          YC_SA_JSON_CREDENTIALS: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
        run: |
          set -euo pipefail
          test -n "${YC_SA_JSON_CREDENTIALS:-}" || { echo "YC_SA_JSON_CREDENTIALS secret is required" >&2; exit 1; }
          test -n "${YC_FOLDER_ID:-}" || { echo "YC_FOLDER_ID is required (vars or secrets)" >&2; exit 1; }
          test -n "${YC_FUNCTION_NAME:-}" || { echo "YC_FUNCTION_NAME (or YC_CLOUD_FUNCTION_NAME) is required" >&2; exit 1; }
          test -n "${YC_SERVICE_ACCOUNT_ID:-}" || { echo "YC_SERVICE_ACCOUNT_ID is required (vars or secrets)" >&2; exit 1; }
          test -n "${YC_FUNCTION_ENTRYPOINT:-}" || { echo "YC_FUNCTION_ENTRYPOINT is required" >&2; exit 1; }

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq zip

      - name: Deploy function version
        if: env.DRY_RUN != 'true'
        uses: yc-actions/yc-sls-function@v4
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          folder-id: ${{ env.YC_FOLDER_ID }}
          function-name: ${{ env.YC_FUNCTION_NAME }}
          runtime: ${{ env.FUNCTION_RUNTIME }}
          entrypoint: ${{ env.YC_FUNCTION_ENTRYPOINT }}
          service-account: ${{ env.YC_SERVICE_ACCOUNT_ID }}
          include: |
            src/**
          exclude: |
            .git/**
            .github/**
            build/**
            docs/**

      - name: Install YC CLI
        run: |
          set -euo pipefail
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i "$HOME/yandex-cloud" -n
          echo "YC_CLI_INITIALIZATION_SILENCE=true" >> "$GITHUB_ENV"
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Configure YC CLI auth via service account key
        env:
          YC_SA_JSON_CREDENTIALS: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
        run: |
          set -euo pipefail
          KEY_FILE="$RUNNER_TEMP/yc-sa-key.json"
          printf '%s' "${YC_SA_JSON_CREDENTIALS}" > "$KEY_FILE"

          yc config profile create ci >/dev/null 2>&1 || true
          yc config profile activate ci
          yc config set service-account-key "$KEY_FILE"
          yc config set folder-id "${YC_FOLDER_ID}"

      - name: Resolve function id
        run: |
          set -euo pipefail
          FUNCTION_ID=$(yc serverless function list --folder-id "${YC_FOLDER_ID}" --format json \
            | jq -r --arg name "${YC_FUNCTION_NAME}" '.[] | select(.name == $name) | .id' \
            | head -n1)

          test -n "${FUNCTION_ID}" || { echo "Unable to resolve YC_FUNCTION_ID for ${YC_FUNCTION_NAME}" >&2; exit 1; }
          echo "YC_FUNCTION_ID=${FUNCTION_ID}" >> "$GITHUB_ENV"

      - name: Apply API Gateway spec and resolve endpoint
        run: |
          set -euo pipefail

          if [[ "${DRY_RUN}" == "true" ]]; then
            BOOTSTRAP_OUTPUT=$(infra/scripts/yc_bootstrap_notify_endpoint.sh --dry-run)
          else
            BOOTSTRAP_OUTPUT=$(infra/scripts/yc_bootstrap_notify_endpoint.sh)
          fi

          echo "${BOOTSTRAP_OUTPUT}"

          GATEWAY_NAME=$(printf '%s\n' "${BOOTSTRAP_OUTPUT}" | awk -F= '/^YC_API_GW_NAME=/{print $2}' | tail -n1)
          ENDPOINT=$(printf '%s\n' "${BOOTSTRAP_OUTPUT}" | awk -F= '/^NOTIFY_ENDPOINT=/{print $2}' | tail -n1)

          test -n "${GATEWAY_NAME}" || { echo "Failed to resolve YC_API_GW_NAME from bootstrap output" >&2; exit 1; }
          test -n "${ENDPOINT}" || { echo "Failed to resolve NOTIFY_ENDPOINT from bootstrap output" >&2; exit 1; }

          echo "YC_API_GW_NAME=${GATEWAY_NAME}" >> "$GITHUB_ENV"
          echo "NOTIFY_ENDPOINT=${ENDPOINT}" >> "$GITHUB_ENV"

      - name: Smoke-check /notify
        env:
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${NOTIFY_API_KEY:-}" ]]; then
            echo "NOTIFY_API_KEY secret is required" >&2
            exit 1
          fi

          test -n "${NOTIFY_ENDPOINT:-}" || { echo "NOTIFY_ENDPOINT could not be resolved" >&2; exit 1; }

          if [[ "${DRY_RUN}" == "true" ]]; then
            infra/scripts/smoke_notify.sh --dry-run
          else
            infra/scripts/smoke_notify.sh
          fi
