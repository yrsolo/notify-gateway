name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run deploy in dry-run mode"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
      YC_FOLDER_ID_FALLBACK: ${{ secrets.YC_FOLDER_ID }}
      YC_FUNCTION_NAME: ${{ vars.YC_FUNCTION_NAME }}
      YC_CLOUD_FUNCTION_NAME: ${{ vars.YC_CLOUD_FUNCTION_NAME }}
      YC_API_GW_NAME: ${{ vars.YC_API_GW_NAME }}
      YC_SERVICE_ACCOUNT_ID: ${{ vars.YC_SERVICE_ACCOUNT_ID }}
      YC_SERVICE_ACCOUNT_ID_FALLBACK: ${{ secrets.YC_SERVICE_ACCOUNT_ID }}
      FUNCTION_SOURCE_DIR: src
      FUNCTION_RUNTIME: python311
      FUNCTION_ENTRYPOINT: handler.handler

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq zip

      - name: Normalize function name alias
        run: |
          set -euo pipefail
          if [[ -z "${YC_FUNCTION_NAME:-}" && -n "${YC_CLOUD_FUNCTION_NAME:-}" ]]; then
            echo "YC_FUNCTION_NAME=${YC_CLOUD_FUNCTION_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Prepare IAM token
        env:
          YC_TOKEN: ${{ secrets.YC_TOKEN }}
          YC_IAM_TOKEN: ${{ secrets.YC_IAM_TOKEN }}
        run: |
          set -euo pipefail
          set +x
          if [[ -n "${YC_IAM_TOKEN:-}" ]]; then
            echo "::add-mask::${YC_IAM_TOKEN}"
            echo "YC_IAM_TOKEN=${YC_IAM_TOKEN}" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ -z "${YC_TOKEN:-}" ]]; then
            echo "Either YC_IAM_TOKEN or YC_TOKEN secret must be configured" >&2
            exit 1
          fi

          IAM_JSON=$(curl -sS -X POST "https://iam.api.cloud.yandex.net/iam/v1/tokens" \
            -H "Content-Type: application/json" \
            -d "{\"yandexPassportOauthToken\":\"${YC_TOKEN}\"}")

          IAM_TOKEN=$(jq -r '.iamToken // empty' <<<"$IAM_JSON")
          if [[ -z "$IAM_TOKEN" ]]; then
            echo "Failed to exchange YC_TOKEN to IAM token" >&2
            exit 1
          fi

          echo "::add-mask::${IAM_TOKEN}"
          echo "YC_IAM_TOKEN=${IAM_TOKEN}" >> "$GITHUB_ENV"

      - name: Resolve dynamic deploy config
        env:
          YC_IAM_TOKEN: ${{ env.YC_IAM_TOKEN }}
        run: |
          set -euo pipefail

          FUNCTION_NAME="${YC_FUNCTION_NAME:-}"
          FOLDER_ID="${YC_FOLDER_ID:-}"
          SERVICE_ACCOUNT_ID="${YC_SERVICE_ACCOUNT_ID:-}"
          API_GW_NAME="${YC_API_GW_NAME:-notify-gateway-gw}"

          if [[ -z "$FOLDER_ID" && -n "${YC_FOLDER_ID_FALLBACK:-}" ]]; then
            FOLDER_ID="${YC_FOLDER_ID_FALLBACK}"
          fi

          if [[ -z "$SERVICE_ACCOUNT_ID" && -n "${YC_SERVICE_ACCOUNT_ID_FALLBACK:-}" ]]; then
            SERVICE_ACCOUNT_ID="${YC_SERVICE_ACCOUNT_ID_FALLBACK}"
          fi

          if [[ -z "$FOLDER_ID" && -n "$FUNCTION_NAME" ]]; then
            echo "YC_FOLDER_ID is not set, trying auto-discovery by function name: ${FUNCTION_NAME}"

            mapfile -t CLOUD_IDS < <(curl -sS -H "Authorization: Bearer ${YC_IAM_TOKEN}" \
              "https://resource-manager.api.cloud.yandex.net/resource-manager/v1/clouds" \
              | jq -r '.clouds[]?.id')

            FOUND=0
            for cloud_id in "${CLOUD_IDS[@]}"; do
              mapfile -t FOLDER_IDS < <(curl -sS -H "Authorization: Bearer ${YC_IAM_TOKEN}" \
                "https://resource-manager.api.cloud.yandex.net/resource-manager/v1/folders?cloudId=${cloud_id}" \
                | jq -r '.folders[]?.id')

              for folder_id in "${FOLDER_IDS[@]}"; do
                fn_id=$(curl -sS -H "Authorization: Bearer ${YC_IAM_TOKEN}" \
                  "https://serverless-functions.api.cloud.yandex.net/functions/v1/functions?folderId=${folder_id}" \
                  | jq -r --arg name "$FUNCTION_NAME" '.functions[]? | select(.name == $name) | .id' \
                  | head -n1)

                if [[ -n "$fn_id" ]]; then
                  FOLDER_ID="$folder_id"
                  FOUND=1
                  break
                fi
              done

              if [[ "$FOUND" -eq 1 ]]; then
                break
              fi
            done
          fi

          if [[ -n "$FOLDER_ID" && -z "$SERVICE_ACCOUNT_ID" ]]; then
            mapfile -t SA_IDS < <(curl -sS -H "Authorization: Bearer ${YC_IAM_TOKEN}" \
              "https://iam.api.cloud.yandex.net/iam/v1/serviceAccounts?folderId=${FOLDER_ID}" \
              | jq -r '.serviceAccounts[]?.id')

            if [[ "${#SA_IDS[@]}" -eq 1 ]]; then
              SERVICE_ACCOUNT_ID="${SA_IDS[0]}"
            fi
          fi

          echo "YC_FOLDER_ID=${FOLDER_ID}" >> "$GITHUB_ENV"
          echo "YC_SERVICE_ACCOUNT_ID=${SERVICE_ACCOUNT_ID}" >> "$GITHUB_ENV"
          echo "YC_API_GW_NAME=${API_GW_NAME}" >> "$GITHUB_ENV"

      - name: Validate required config
        run: |
          set -euo pipefail
          test -n "${YC_FOLDER_ID:-}" || { echo "YC_FOLDER_ID is required (vars.YC_FOLDER_ID or secret YC_FOLDER_ID)" >&2; exit 1; }
          test -n "${YC_FUNCTION_NAME:-}" || {
            echo "YC_FUNCTION_NAME is required (or set YC_CLOUD_FUNCTION_NAME as alias)" >&2
            exit 1
          }
          test -n "${YC_SERVICE_ACCOUNT_ID:-}" || { echo "YC_SERVICE_ACCOUNT_ID is required (vars.YC_SERVICE_ACCOUNT_ID or secret YC_SERVICE_ACCOUNT_ID)" >&2; exit 1; }

      - name: Install YC CLI
        run: |
          set -euo pipefail
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i "$HOME/yandex-cloud" -n
          echo "YC_CLI_INITIALIZATION_SILENCE=true" >> "$GITHUB_ENV"
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Resolve dry-run mode
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "DRY_RUN=${{ inputs.dry_run }}" >> "$GITHUB_ENV"
          else
            echo "DRY_RUN=false" >> "$GITHUB_ENV"
          fi

      - name: Collect YC context
        env:
          YC_IAM_TOKEN: ${{ env.YC_IAM_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${DRY_RUN}" == "true" ]]; then
            infra/scripts/yc_collect_context.sh --dry-run
          else
            infra/scripts/yc_collect_context.sh
          fi

      - name: Deploy Function
        env:
          YC_IAM_TOKEN: ${{ env.YC_IAM_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${DRY_RUN}" == "true" ]]; then
            infra/scripts/yc_deploy_function.sh --dry-run
          else
            infra/scripts/yc_deploy_function.sh
          fi

      - name: Resolve function id
        run: |
          set -euo pipefail
          FUNCTION_ID=$(yc serverless function list --folder-id "${YC_FOLDER_ID}" --format json \
            | jq -r --arg name "${YC_FUNCTION_NAME}" '.[] | select(.name == $name) | .id' \
            | head -n1)

          test -n "${FUNCTION_ID}" || { echo "Unable to resolve YC_FUNCTION_ID for ${YC_FUNCTION_NAME}" >&2; exit 1; }
          echo "YC_FUNCTION_ID=${FUNCTION_ID}" >> "$GITHUB_ENV"

      - name: Apply API Gateway spec and resolve endpoint
        env:
          YC_IAM_TOKEN: ${{ env.YC_IAM_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "${DRY_RUN}" == "true" ]]; then
            BOOTSTRAP_OUTPUT=$(infra/scripts/yc_bootstrap_notify_endpoint.sh --dry-run)
          else
            BOOTSTRAP_OUTPUT=$(infra/scripts/yc_bootstrap_notify_endpoint.sh)
          fi

          echo "${BOOTSTRAP_OUTPUT}"

          GATEWAY_NAME=$(printf '%s\n' "${BOOTSTRAP_OUTPUT}" | awk -F= '/^YC_API_GW_NAME=/{print $2}' | tail -n1)
          ENDPOINT=$(printf '%s\n' "${BOOTSTRAP_OUTPUT}" | awk -F= '/^NOTIFY_ENDPOINT=/{print $2}' | tail -n1)

          test -n "${GATEWAY_NAME}" || { echo "Failed to resolve YC_API_GW_NAME from bootstrap output" >&2; exit 1; }
          test -n "${ENDPOINT}" || { echo "Failed to resolve NOTIFY_ENDPOINT from bootstrap output" >&2; exit 1; }

          echo "YC_API_GW_NAME=${GATEWAY_NAME}" >> "$GITHUB_ENV"
          echo "NOTIFY_ENDPOINT=${ENDPOINT}" >> "$GITHUB_ENV"

      - name: Smoke-check /notify
        env:
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${NOTIFY_API_KEY:-}" ]]; then
            echo "NOTIFY_API_KEY secret is required" >&2
            exit 1
          fi

          test -n "${NOTIFY_ENDPOINT:-}" || { echo "NOTIFY_ENDPOINT could not be resolved" >&2; exit 1; }

          if [[ "${DRY_RUN}" == "true" ]]; then
            infra/scripts/smoke_notify.sh --dry-run
          else
            infra/scripts/smoke_notify.sh
          fi
